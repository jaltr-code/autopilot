version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: autopilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: autopilot
      POSTGRES_DB: autopilot
    ports:
      - "5432:5432"
    volumes:
      - autopilot_postgres_data:/var/lib/postgresql/data

volumes:
  autopilot_postgres_data: